version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hft_db
      POSTGRES_USER: hft_user
      POSTGRES_PASSWORD: hft_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hft_user -d hft_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  hft-trading:
    build:
      context: .
      dockerfile: hft-trading/Dockerfile
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hft_db
      SPRING_DATASOURCE_USERNAME: hft_user
      SPRING_DATASOURCE_PASSWORD: hft_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy

  hft-dashboard:
    build:
      context: .
      dockerfile: hft-dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hft_db
      SPRING_DATASOURCE_USERNAME: hft_user
      SPRING_DATASOURCE_PASSWORD: hft_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy

  hft-bot:
    build:
      context: .
      dockerfile: hft-bot/Dockerfile
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hft_db
      SPRING_DATASOURCE_USERNAME: hft_user
      SPRING_DATASOURCE_PASSWORD: hft_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
