# HFT Wallet Application Configuration

# Server Configuration
server.port=8081
spring.application.name=hft-wallet

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:walletdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# JWT Configuration
jwt.secret=your-256-bit-secret-key-change-this-in-production-please-use-a-strong-random-key
jwt.expiration=86400000

# Web3 Configuration
web3.rpc.url=https://eth.public-rpc.com

# Logging
logging.level.com.hft.wallet=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.jdbc=DEBUG
