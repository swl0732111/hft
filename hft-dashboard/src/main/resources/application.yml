server:
  port: 8081

# Disable RocksDB in Dashboard (only Trading service should use it)
rocksdb:
  enabled: false

# Disable FIX protocol in Dashboard (only Trading service needs it)
fix:
  enabled: false

spring:
  application:
    name: hft-dashboard
  datasource:
    url: jdbc:h2:mem:hftdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

logging:
  level:
    com.hft: INFO
    org.springframework: WARN
