server:
  port: 8082

spring:
  application:
    name: hft-account
  datasource:
    url: jdbc:h2:mem:hftdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

logging:
  level:
    com.hft: INFO
    org.springframework: WARN
