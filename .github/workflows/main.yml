name: Sync Code Index On Merge

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  sync-code-index:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pio-agent code sync
        env:
          PIO_SYNC_URL: ${{ secrets.PIO_AGENT_SYNC_URL }}
          PIO_SYNC_OIDC_AUDIENCE: ${{ secrets.PIO_AGENT_SYNC_OIDC_AUDIENCE }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "$PIO_SYNC_URL" ] || [ -z "$PIO_SYNC_OIDC_AUDIENCE" ] || [ -z "$SHA" ]; then
            echo "Missing required sync inputs"
            exit 1
          fi
          payload="$(cat <<EOF
          {
            "repo_full_name": "$REPO",
            "commit_sha": "$SHA"
          }
          EOF
          )"
          encoded_audience="$(python -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["PIO_SYNC_OIDC_AUDIENCE"], safe=""))')"
          oidc_resp="$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${encoded_audience}")"
          oidc_token="$(OIDC_RESP="$oidc_resp" python -c 'import json, os; print(json.loads(os.environ["OIDC_RESP"])["value"])')"
          if [ -z "$oidc_token" ]; then
            echo "Failed to fetch GitHub OIDC token"
            exit 1
          fi
          echo "::add-mask::$oidc_token"
          curl --fail-with-body -X POST "$PIO_SYNC_URL/ops/github/code-sync" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $oidc_token" \
            --data "$payload"

