# QuickFIX Server Configuration
# FIX Protocol Server for HFT Trading System

[DEFAULT]
ConnectionType=acceptor
ReconnectInterval=60
FileStorePath=target/data/quickfix/store
FileLogPath=target/data/quickfix/log
StartTime=00:00:00
EndTime=00:00:00
UseDataDictionary=Y
DataDictionary=FIX44.xml
ValidateUserDefinedFields=N
ValidateFieldsOutOfOrder=N
ValidateFieldsHaveValues=N
ValidateUnorderedGroupFields=N
ResetOnLogon=Y
ResetOnLogout=N
ResetOnDisconnect=N

# Session Configuration
[SESSION]
BeginString=FIX.4.4
SenderCompID=HFT_SERVER
TargetCompID=CLIENT
SocketAcceptPort=9876
HeartBtInt=30
